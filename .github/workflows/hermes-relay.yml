name: Hermes Relay

on:
  schedule:
    - cron: '0 11 * * *'  # 11:00 UTC daily
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hermes-relay:
    runs-on: ubuntu-latest
    env:
      OPPOSITE_OSIRIS_PAT: ${{ secrets.OPPOSITE_OSIRIS_PAT }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Checkout opposite-osiris blog repo
        if: env.OPPOSITE_OSIRIS_PAT != ''
        uses: actions/checkout@v4
        with:
          repository: r0cstar09/opposite-osiris
          token: ${{ secrets.OPPOSITE_OSIRIS_PAT }}
          path: opposite-osiris-site

      - name: Set up Node for opposite-osiris
        if: env.OPPOSITE_OSIRIS_PAT != ''
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: opposite-osiris-site/package-lock.json

      - name: Install opposite-osiris dependencies
        if: env.OPPOSITE_OSIRIS_PAT != ''
        working-directory: opposite-osiris-site
        run: npm ci

      - name: Run unit tests
        run: python -m unittest discover -v

      - name: Restore SQLite persistence cache
        uses: actions/cache@v4
        with:
          path: hermes_relay.db*
          key: hermes-relay-db-${{ github.run_id }}
          restore-keys: |
            hermes-relay-db-

      - name: Validate environment variables
        run: |
          echo "Checking required secrets..."
          if [ -z "${{ secrets.GCP_SA_KEY }}" ]; then
            echo "❌ GCP_SA_KEY is not set"
            exit 1
          fi
          if [ -z "${{ secrets.GOOGLE_CLOUD_PROJECT }}" ]; then
            echo "❌ GOOGLE_CLOUD_PROJECT is not set"
            exit 1
          fi
          if [ -z "${{ secrets.GOOGLE_CLOUD_LOCATION }}" ]; then
            echo "⚠️  GOOGLE_CLOUD_LOCATION is not set, will use default: us-central1"
          else
            echo "✓ GOOGLE_CLOUD_LOCATION is set"
          fi
          echo "✓ GOOGLE_CLOUD_PROJECT is set"
          echo "✓ All required secrets are configured"
          echo "Project: ${{ secrets.GOOGLE_CLOUD_PROJECT }}"
          echo "Location: ${{ secrets.GOOGLE_CLOUD_LOCATION || 'us-central1' }}"

      - name: Run Hermes Relay Orchestrator
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
          CLOUDSDK_AUTH_CREDENTIAL_FILE_OVERRIDE: ${{ steps.auth.outputs.credentials_file_path }}
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
          GOOGLE_CLOUD_LOCATION: ${{ secrets.GOOGLE_CLOUD_LOCATION || 'us-central1' }}
          VERTEX_MODEL: ${{ secrets.VERTEX_MODEL || 'gemini-2.5-flash' }}
          VERTEX_MODEL_RESOURCE: ${{ secrets.VERTEX_MODEL_RESOURCE }}
          HERMES_RELAY_DB: hermes_relay.db
          ICLOUD_EMAIL: ${{ secrets.ICLOUD_EMAIL }}
          ICLOUD_PASSWORD: ${{ secrets.ICLOUD_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
        run: |
          echo "Environment check before running:"
          echo "GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT}"
          echo "GOOGLE_CLOUD_LOCATION: ${GOOGLE_CLOUD_LOCATION:-us-central1 (default)}"
          echo "VERTEX_MODEL: ${VERTEX_MODEL:-gemini-2.5-flash (default)}"
          if [ -n "${VERTEX_MODEL_RESOURCE}" ]; then
            echo "Using VERTEX_MODEL_RESOURCE override"
          fi
          python orchestrator.py

      - name: Publish top story to opposite-osiris blog
        if: env.OPPOSITE_OSIRIS_PAT != ''
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
          CLOUDSDK_AUTH_CREDENTIAL_FILE_OVERRIDE: ${{ steps.auth.outputs.credentials_file_path }}
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
          GOOGLE_CLOUD_LOCATION: ${{ secrets.GOOGLE_CLOUD_LOCATION || 'us-central1' }}
          VERTEX_MODEL: ${{ secrets.VERTEX_MODEL || 'gemini-2.5-flash' }}
          VERTEX_MODEL_RESOURCE: ${{ secrets.VERTEX_MODEL_RESOURCE }}
          VERTEX_BLOG_EDITOR_MODEL: ${{ secrets.VERTEX_BLOG_EDITOR_MODEL || 'gemini-3.5-flash' }}
          VERTEX_BLOG_IMAGE_MODEL: ${{ secrets.VERTEX_BLOG_IMAGE_MODEL || 'imagen-4.0-generate-001' }}
        run: |
          git -C opposite-osiris-site config user.name "Hermes Relay Bot"
          git -C opposite-osiris-site config user.email "actions@github.com"
          today=$(date -u +%F)
          briefing_json="json_output/${today}/hermes_llm_top3_${today}.json"
          signal_json="hermes_signal_${today}.json"
          if [ ! -f "${briefing_json}" ] || [ ! -f "${signal_json}" ]; then
            echo "No current-day briefing/signal files found; skipping blog publish."
            exit 0
          fi
          python publish_blog_post.py \
            --briefing-json "${briefing_json}" \
            --signal-json "${signal_json}" \
            --site-dir opposite-osiris-site \
            --editor-model "${VERTEX_BLOG_EDITOR_MODEL}" \
            --image-model "${VERTEX_BLOG_IMAGE_MODEL}" \
            --voice-profile prompts/tony_voice.md \
            --verify-build \
            --commit \
            --push

      - name: Skip blog publishing when opposite-osiris token is missing
        if: env.OPPOSITE_OSIRIS_PAT == ''
        run: echo "OPPOSITE_OSIRIS_PAT is not configured; skipping blog publish."

      - name: Upload output artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hermes-relay-output
          path: |
            hermes_relay.db*
            hermes_signal_*.json
            json_output/
          retention-days: 30
